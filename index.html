
<script>

const API_URL = "http://localhost:3000";

// ✅ BUY ELECTRICITY
function buy() {
  const user = document.getElementById("user").value;
  const account = document.getElementById("account").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if (!user || !account || !amount) {
    alert("Fill all fields");
    return;
  }

  fetch(API_URL + "/api/vend", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user: user,
      bp_acc_id: parseInt(account),
      amount: amount
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById("msg").innerText =
`✅ Token: ${data.token}
⚡ Units: ${data.units} kWh
💰 Amount: R${data.amount}`;

      loadData();
    } else {
      alert(data.message);
    }
  });
}

// ✅ LOAD TRANSACTIONS
function loadData() {
  fetch(API_URL + "/api/transactions")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(txn => {
        const li = document.createElement("li");
        li.innerText =
          `User: ${txn.user} | Meter: ${txn.bp_acc_id} | R${txn.amount} | ${txn.units} kWh`;
        list.appendChild(li);
      });
    });
}

// ✅ LOAD ON START
loadData();

</script>
